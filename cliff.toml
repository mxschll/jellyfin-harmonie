# git-cliff config — generates release notes grouped by conventional-commit
# type. Used by .github/workflows/release.yml.

[changelog]
header = ""
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }} ({{ commit.id | truncate(length=7, end="") }})
{%- endfor %}
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
filter_commits = false
sort_commits = "newest"
topo_order = false
commit_parsers = [
  # Hide the bot's own auto-commits from the changelog.
  { message = "^chore: update manifest", skip = true },
  { message = "^feat",     group = "✨ Features" },
  { message = "^fix",      group = "🐛 Bug Fixes" },
  { message = "^perf",     group = "⚡ Performance" },
  { message = "^refactor", group = "🚜 Refactor" },
  { message = "^docs",     group = "📚 Documentation" },
  { message = "^test",     group = "🧪 Tests" },
  { message = "^build",    group = "🏗️  Build" },
  { message = "^ci",       group = "👷 CI" },
  { message = "^chore",    group = "🧹 Chores" },
  { message = "^revert",   group = "⏪ Revert" },
  { message = "^style",    group = "🎨 Style" },
  # Anything else falls into "Other".
  { message = ".*",        group = "Other" },
]
