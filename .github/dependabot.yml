version: 2
updates:
  # Keep the Jellyfin SDK and other NuGet packages current.
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      jellyfin:
        patterns:
          - "Jellyfin.*"
      analyzers:
        patterns:
          - "*Analyzer*"
          - "StyleCop.*"
      skiasharp:
        patterns:
          - "SkiaSharp*"

  # Keep workflow Action versions current (e.g. actions/checkout@v4 → v5).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
