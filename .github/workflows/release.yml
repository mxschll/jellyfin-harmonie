name: Release

# Tag-driven versioning. Every push to main that touches plugin code
# computes the next version from the most recent `v*.*.*` git tag,
# pushes the new tag, builds both ABI ZIPs, creates a GitHub Release,
# and updates manifest.json so the Jellyfin catalog picks up the new
# version automatically.
#
# Bump level (default: patch) is taken from the subject line of the
# HEAD commit:
#
#   [bump minor]   -> X.Y.Z → X.(Y+1).0
#   [bump major]   -> X.Y.Z → (X+1).0.0
#   [skip release] -> no tag/build/release (alias: [skip ci])
#
# Subject-only matching is deliberate: it stops markers in code blocks
# or PR descriptions from accidentally bumping the version. For PR
# merges, put the marker on the squash/merge commit's subject (the
# easiest way is to include it in the PR title).
#
# workflow_dispatch overrides the level via the `level` input.
#
# Two ZIPs are built per release: one for Jellyfin 10.10 (net8.0) and
# one for Jellyfin 10.11 (net9.0). Both attach to the same GitHub
# Release; manifest.json carries one entry per ABI. The ABI octet (.0
# / .1) is appended to the resolved semver (X.Y.Z) only at package
# time — the git tag itself stays three-octet.

on:
  push:
    branches: [main]
    paths:
      - 'Jellyfin.Plugin.Harmonie/**'
      - 'Jellyfin.Plugin.Harmonie.sln'
      - 'Directory.Build.props'
      - 'jellyfin.ruleset'
      - '.github/workflows/release.yml'
      - 'cliff.toml'
  workflow_dispatch:
    inputs:
      level:
        description: 'Version bump level'
        required: false
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

# Serialise so two pushes in quick succession can't both compute the
# same next version and collide on tag push.
concurrency:
  group: release
  cancel-in-progress: false

env:
  # Opt in to Node 24 now to silence the upcoming deprecation warning.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    runs-on: ubuntu-latest

    env:
      ABI_NET8: "10.10.0.0"
      ABI_NET9: "10.11.0.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          # Need full history + every tag so the bump can find the
          # most recent v*.*.*.
          fetch-depth: 0
          fetch-tags: true

      - name: Decide bump
        id: decide
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "skip=false"  >> "$GITHUB_OUTPUT"
            echo "level=${{ inputs.level }}" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch: level=${{ inputs.level }}"
            exit 0
          fi

          # %s is the subject line only. Markers in the body are
          # intentionally ignored to keep meta-commits safe.
          subject=$(git log -1 --pretty=%s)
          echo "subject: $subject"

          if echo "$subject" | grep -qE '\[skip release\]|\[skip ci\]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping per subject marker."
          elif echo "$subject" | grep -qE '\[bump major\]'; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "level=major" >> "$GITHUB_OUTPUT"
          elif echo "$subject" | grep -qE '\[bump minor\]'; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "level=minor" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "level=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next version
        if: steps.decide.outputs.skip == 'false'
        id: version
        env:
          LEVEL: ${{ steps.decide.outputs.level }}
        run: |
          set -euo pipefail
          latest=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)
          latest=${latest:-v0.0.0}
          IFS='.' read -r major minor patch <<< "${latest#v}"
          case "$LEVEL" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
            *) echo "unknown bump level: $LEVEL" >&2; exit 1 ;;
          esac
          BASE="${major}.${minor}.${patch}"
          TAG="v${BASE}"
          echo "tag=$TAG"          >> "$GITHUB_OUTPUT"
          echo "base=$BASE"        >> "$GITHUB_OUTPUT"
          echo "v_net8=${BASE}.0"  >> "$GITHUB_OUTPUT"  # Jellyfin 10.10
          echo "v_net9=${BASE}.1"  >> "$GITHUB_OUTPUT"  # Jellyfin 10.11
          echo "Bumping ${latest} → ${TAG} (level=${LEVEL})"
          echo "Per-ABI: 10.10=${BASE}.0  10.11=${BASE}.1"

      - name: Install git-cliff
        if: steps.decide.outputs.skip == 'false'
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate changelog from commits
        if: steps.decide.outputs.skip == 'false'
        run: |
          # --unreleased: commits since the most recent tag. We run
          # this BEFORE pushing the new tag so the most recent tag is
          # still the previous release; otherwise the new tag would be
          # the most recent one and there would be no "unreleased"
          # commits to summarise.
          # --strip header: drop the "# Changelog" preamble.
          git-cliff --unreleased --strip header --output CHANGELOG_LATEST.md
          echo "---changelog---"
          cat CHANGELOG_LATEST.md
          echo "--------------"

      - name: Push tag
        if: steps.decide.outputs.skip == 'false'
        env:
          NEW_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

      - name: Setup .NET
        if: steps.decide.outputs.skip == 'false'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Build & package for Jellyfin 10.10 (net8.0)
        if: steps.decide.outputs.skip == 'false'
        id: pkg8
        run: |
          set -euo pipefail
          VERSION=${{ steps.version.outputs.v_net8 }}
          ABI=${{ env.ABI_NET8 }}

          dotnet publish Jellyfin.Plugin.Harmonie/Jellyfin.Plugin.Harmonie.csproj \
            --configuration Release -f net8.0 \
            -p:Version=${VERSION} \
            -p:AssemblyVersion=${VERSION} \
            -p:FileVersion=${VERSION}

          PUB=Jellyfin.Plugin.Harmonie/bin/Release/net8.0/publish
          STG=staging-net8
          ZIP="jellyfin-harmonie_${VERSION}.zip"
          mkdir -p "$STG"
          cp "$PUB/Jellyfin.Plugin.Harmonie.dll" "$STG/"
          cp Jellyfin.Plugin.Harmonie/banner.png "$STG/"
          cat > "$STG/meta.json" <<EOF
          {
            "category": "Music",
            "changelog": "",
            "description": "Generate Jellyfin playlists from harmonie audio similarity.",
            "guid": "485e9b6f-f623-4c97-9679-ad33c1db0d18",
            "name": "Harmonie",
            "overview": "Build playlists from harmonie audio similarity.",
            "owner": "mxschll",
            "targetAbi": "${ABI}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%S.0000000Z)",
            "version": "${VERSION}",
            "status": "Active",
            "autoUpdate": true,
            "imagePath": "banner.png",
            "assemblies": [
              "Jellyfin.Plugin.Harmonie.dll"
            ]
          }
          EOF
          (cd "$STG" && zip -j "../$ZIP" Jellyfin.Plugin.Harmonie.dll banner.png meta.json)
          CHECKSUM=$(md5sum "$ZIP" | awk '{print $1}')
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "checksum=$CHECKSUM" >> "$GITHUB_OUTPUT"

      - name: Build & package for Jellyfin 10.11 (net9.0)
        if: steps.decide.outputs.skip == 'false'
        id: pkg9
        run: |
          set -euo pipefail
          VERSION=${{ steps.version.outputs.v_net9 }}
          ABI=${{ env.ABI_NET9 }}

          dotnet publish Jellyfin.Plugin.Harmonie/Jellyfin.Plugin.Harmonie.csproj \
            --configuration Release -f net9.0 \
            -p:Version=${VERSION} \
            -p:AssemblyVersion=${VERSION} \
            -p:FileVersion=${VERSION}

          PUB=Jellyfin.Plugin.Harmonie/bin/Release/net9.0/publish
          STG=staging-net9
          ZIP="jellyfin-harmonie_${VERSION}.zip"
          mkdir -p "$STG"
          cp "$PUB/Jellyfin.Plugin.Harmonie.dll" "$STG/"
          cp Jellyfin.Plugin.Harmonie/banner.png "$STG/"
          cat > "$STG/meta.json" <<EOF
          {
            "category": "Music",
            "changelog": "",
            "description": "Generate Jellyfin playlists from harmonie audio similarity.",
            "guid": "485e9b6f-f623-4c97-9679-ad33c1db0d18",
            "name": "Harmonie",
            "overview": "Build playlists from harmonie audio similarity.",
            "owner": "mxschll",
            "targetAbi": "${ABI}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%S.0000000Z)",
            "version": "${VERSION}",
            "status": "Active",
            "autoUpdate": true,
            "imagePath": "banner.png",
            "assemblies": [
              "Jellyfin.Plugin.Harmonie.dll"
            ]
          }
          EOF
          (cd "$STG" && zip -j "../$ZIP" Jellyfin.Plugin.Harmonie.dll banner.png meta.json)
          CHECKSUM=$(md5sum "$ZIP" | awk '{print $1}')
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "checksum=$CHECKSUM" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release with both ZIPs
        if: steps.decide.outputs.skip == 'false'
        id: release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: CHANGELOG_LATEST.md
          files: |
            ${{ steps.pkg8.outputs.zip }}
            ${{ steps.pkg9.outputs.zip }}

      - name: Update manifest.json with both entries
        if: steps.decide.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO="${GITHUB_REPOSITORY}"
          TAG=${{ steps.version.outputs.tag }}
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # Read git-cliff's grouped changelog and inline it into the
          # manifest. Newlines collapsed and length capped so it stays
          # readable as a one-liner in Jellyfin's catalog tooltip.
          if [ -s CHANGELOG_LATEST.md ]; then
            CHANGELOG=$(cat CHANGELOG_LATEST.md | sed 's/"/\\"/g' | tr '\n' ' ' | head -c 1500)
          else
            CHANGELOG="Release ${TAG}."
          fi
          if [ -z "$(echo -n "$CHANGELOG" | tr -d ' ')" ]; then CHANGELOG="Release ${TAG}."; fi

          export V8=${{ steps.pkg8.outputs.version }}
          export V9=${{ steps.pkg9.outputs.version }}
          export CK8=${{ steps.pkg8.outputs.checksum }}
          export CK9=${{ steps.pkg9.outputs.checksum }}
          export ZIP8=${{ steps.pkg8.outputs.zip }}
          export ZIP9=${{ steps.pkg9.outputs.zip }}
          export ABI8=${{ env.ABI_NET8 }}
          export ABI9=${{ env.ABI_NET9 }}
          export REPO TAG TS CHANGELOG

          python3 - <<'PY'
          import json, os, pathlib

          path = pathlib.Path("manifest.json")
          data = json.loads(path.read_text())
          plugin = data[0]
          plugin.setdefault("versions", [])

          repo = os.environ["REPO"]
          tag = os.environ["TAG"]
          changelog = os.environ.get("CHANGELOG", "")
          ts = os.environ["TS"]

          new_entries = []
          for v, ck, zip_, abi in [
              (os.environ["V9"], os.environ["CK9"], os.environ["ZIP9"], os.environ["ABI9"]),
              (os.environ["V8"], os.environ["CK8"], os.environ["ZIP8"], os.environ["ABI8"]),
          ]:
              new_entries.append({
                  "version": v,
                  "changelog": changelog,
                  "targetAbi": abi,
                  "sourceUrl": f"https://github.com/{repo}/releases/download/{tag}/{zip_}",
                  "checksum": ck,
                  "timestamp": ts,
              })

          new_versions = {e["version"] for e in new_entries}
          plugin["versions"] = [v for v in plugin["versions"] if v.get("version") not in new_versions]
          plugin["versions"] = new_entries + plugin["versions"]

          path.write_text(json.dumps(data, indent=2) + "\n")
          PY

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          if git diff --cached --quiet; then
            echo "manifest.json unchanged."
          else
            # The release workflow's path filter excludes manifest.json,
            # so committing here does not trigger another release. We
            # leave [skip ci] off the message so the CI workflow still
            # runs on this commit and the bot's commit shows up green
            # in the commit list.
            git commit -m "chore: update manifest for ${TAG}"
            git push origin main
          fi
