name: Release

# Auto-publish on every push to main that touches source code, plus a
# manual trigger via the Actions UI. The path filter excludes the
# workflow's own manifest auto-commits and pure docs commits, so they
# don't kick off a release.
#
# Two ZIPs are built per release: one for Jellyfin 10.10 (net8.0) and
# one for Jellyfin 10.11 (net9.0). Both attach to the same GitHub
# Release; manifest.json carries one entry per ABI.

on:
  push:
    branches: [main]
    paths:
      - 'Jellyfin.Plugin.Harmonie/**'
      - 'Jellyfin.Plugin.Harmonie.sln'
      - 'Directory.Build.props'
      - 'jellyfin.ruleset'
      - '.github/workflows/release.yml'
      - 'cliff.toml'
  workflow_dispatch:

permissions:
  contents: write

env:
  # Opt in to Node 24 now to silence the upcoming deprecation warning.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    runs-on: ubuntu-latest

    env:
      ABI_NET8: "10.10.0.0"
      ABI_NET9: "10.11.0.0"
      # Bump this whenever you want to roll the major/minor (e.g. when the
      # plugin's behavior changes meaningfully). The patch slot is the
      # GitHub Actions run number.
      BASE_VERSION: "0.1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Generate changelog from commits
        id: changelog
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          # --unreleased: only commits since the most recent tag.
          # --strip header: drop the "# Changelog" preamble.
          args: --unreleased --strip header
          output: CHANGELOG_LATEST.md

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Derive version
        id: version
        run: |
          BASE="${BASE_VERSION}.${GITHUB_RUN_NUMBER}"  # e.g. 0.1.42
          TAG="v${BASE}"                              # e.g. v0.1.42
          echo "tag=$TAG"          >> "$GITHUB_OUTPUT"
          echo "base=$BASE"        >> "$GITHUB_OUTPUT"
          echo "v_net8=${BASE}.0"  >> "$GITHUB_OUTPUT"  # Jellyfin 10.10
          echo "v_net9=${BASE}.1"  >> "$GITHUB_OUTPUT"  # Jellyfin 10.11
          echo "Resolved tag $TAG → 10.10 build ${BASE}.0 / 10.11 build ${BASE}.1"

      - name: Build & package for Jellyfin 10.10 (net8.0)
        id: pkg8
        run: |
          set -euo pipefail
          VERSION=${{ steps.version.outputs.v_net8 }}
          ABI=${{ env.ABI_NET8 }}

          dotnet publish Jellyfin.Plugin.Harmonie/Jellyfin.Plugin.Harmonie.csproj \
            --configuration Release -f net8.0 \
            -p:Version=${VERSION} \
            -p:AssemblyVersion=${VERSION} \
            -p:FileVersion=${VERSION}

          PUB=Jellyfin.Plugin.Harmonie/bin/Release/net8.0/publish
          STG=staging-net8
          ZIP="jellyfin-harmonie_${VERSION}.zip"
          mkdir -p "$STG"
          cp "$PUB/Jellyfin.Plugin.Harmonie.dll" "$STG/"
          cat > "$STG/meta.json" <<EOF
          {
            "category": "Music",
            "changelog": "",
            "description": "Generate Jellyfin playlists from harmonie audio similarity.",
            "guid": "485e9b6f-f623-4c97-9679-ad33c1db0d18",
            "name": "Harmonie",
            "overview": "Build playlists from harmonie audio similarity.",
            "owner": "mxschll",
            "targetAbi": "${ABI}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%S.0000000Z)",
            "version": "${VERSION}",
            "status": "Active",
            "autoUpdate": true,
            "assemblies": [
              "Jellyfin.Plugin.Harmonie.dll"
            ]
          }
          EOF
          (cd "$STG" && zip -j "../$ZIP" Jellyfin.Plugin.Harmonie.dll meta.json)
          CHECKSUM=$(md5sum "$ZIP" | awk '{print $1}')
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "checksum=$CHECKSUM" >> "$GITHUB_OUTPUT"

      - name: Build & package for Jellyfin 10.11 (net9.0)
        id: pkg9
        run: |
          set -euo pipefail
          VERSION=${{ steps.version.outputs.v_net9 }}
          ABI=${{ env.ABI_NET9 }}

          dotnet publish Jellyfin.Plugin.Harmonie/Jellyfin.Plugin.Harmonie.csproj \
            --configuration Release -f net9.0 \
            -p:Version=${VERSION} \
            -p:AssemblyVersion=${VERSION} \
            -p:FileVersion=${VERSION}

          PUB=Jellyfin.Plugin.Harmonie/bin/Release/net9.0/publish
          STG=staging-net9
          ZIP="jellyfin-harmonie_${VERSION}.zip"
          mkdir -p "$STG"
          cp "$PUB/Jellyfin.Plugin.Harmonie.dll" "$STG/"
          cat > "$STG/meta.json" <<EOF
          {
            "category": "Music",
            "changelog": "",
            "description": "Generate Jellyfin playlists from harmonie audio similarity.",
            "guid": "485e9b6f-f623-4c97-9679-ad33c1db0d18",
            "name": "Harmonie",
            "overview": "Build playlists from harmonie audio similarity.",
            "owner": "mxschll",
            "targetAbi": "${ABI}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%S.0000000Z)",
            "version": "${VERSION}",
            "status": "Active",
            "autoUpdate": true,
            "assemblies": [
              "Jellyfin.Plugin.Harmonie.dll"
            ]
          }
          EOF
          (cd "$STG" && zip -j "../$ZIP" Jellyfin.Plugin.Harmonie.dll meta.json)
          CHECKSUM=$(md5sum "$ZIP" | awk '{print $1}')
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "checksum=$CHECKSUM" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release with both ZIPs
        id: release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: CHANGELOG_LATEST.md
          files: |
            ${{ steps.pkg8.outputs.zip }}
            ${{ steps.pkg9.outputs.zip }}

      - name: Update manifest.json with both entries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO="${GITHUB_REPOSITORY}"
          TAG=${{ steps.version.outputs.tag }}
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # Read git-cliff's grouped changelog and inline it into the
          # manifest. Newlines collapsed and length capped so it stays
          # readable as a one-liner in Jellyfin's catalog tooltip.
          if [ -s CHANGELOG_LATEST.md ]; then
            CHANGELOG=$(cat CHANGELOG_LATEST.md | sed 's/"/\\"/g' | tr '\n' ' ' | head -c 1500)
          else
            CHANGELOG="Release ${TAG}."
          fi
          if [ -z "$(echo -n "$CHANGELOG" | tr -d ' ')" ]; then CHANGELOG="Release ${TAG}."; fi

          export V8=${{ steps.pkg8.outputs.version }}
          export V9=${{ steps.pkg9.outputs.version }}
          export CK8=${{ steps.pkg8.outputs.checksum }}
          export CK9=${{ steps.pkg9.outputs.checksum }}
          export ZIP8=${{ steps.pkg8.outputs.zip }}
          export ZIP9=${{ steps.pkg9.outputs.zip }}
          export ABI8=${{ env.ABI_NET8 }}
          export ABI9=${{ env.ABI_NET9 }}
          export REPO TAG TS CHANGELOG

          python3 - <<'PY'
          import json, os, pathlib

          path = pathlib.Path("manifest.json")
          data = json.loads(path.read_text())
          plugin = data[0]
          plugin.setdefault("versions", [])

          repo = os.environ["REPO"]
          tag = os.environ["TAG"]
          changelog = os.environ.get("CHANGELOG", "")
          ts = os.environ["TS"]

          new_entries = []
          for v, ck, zip_, abi in [
              (os.environ["V9"], os.environ["CK9"], os.environ["ZIP9"], os.environ["ABI9"]),
              (os.environ["V8"], os.environ["CK8"], os.environ["ZIP8"], os.environ["ABI8"]),
          ]:
              new_entries.append({
                  "version": v,
                  "changelog": changelog,
                  "targetAbi": abi,
                  "sourceUrl": f"https://github.com/{repo}/releases/download/{tag}/{zip_}",
                  "checksum": ck,
                  "timestamp": ts,
              })

          new_versions = {e["version"] for e in new_entries}
          plugin["versions"] = [v for v in plugin["versions"] if v.get("version") not in new_versions]
          plugin["versions"] = new_entries + plugin["versions"]

          path.write_text(json.dumps(data, indent=2) + "\n")
          PY

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          if git diff --cached --quiet; then
            echo "manifest.json unchanged."
          else
            # [skip ci] is paranoia — the path filter on this workflow
            # already excludes manifest.json, so this commit wouldn't
            # trigger a second run anyway.
            git commit -m "chore: update manifest for ${TAG} [skip ci]"
            git push origin main
          fi
